<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat · Yixin Li</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    /* ── Full-height chat layout ── */
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    /* topbar */
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 20px 32px;
      border-bottom: 1px solid var(--paper-edge);
    }

    .brand {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 400;
      font-variation-settings: "opsz" 24;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
    }
    .brand:hover { opacity: 0.72; color: var(--ink); text-decoration: none; }

    .topbar nav { display: flex; gap: 24px; }
    .topbar nav a {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-3);
      text-decoration: none;
      transition: color 140ms;
    }
    .topbar nav a:hover, .topbar nav a.is-active { color: var(--ink); }

    /* ── Page wrapper ── */
    .chat-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chat-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 32px;
      min-height: 0;
    }

    /* intro */
    .chat-intro {
      padding: 36px 0 24px;
      flex-shrink: 0;
    }
    .chat-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 10px;
    }
    .chat-intro h1 {
      font-family: 'Autumn Brush', cursive;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .chat-intro p {
      font-size: 15px;
      color: var(--ink-3);
      max-width: 52ch;
      line-height: 1.6;
    }

    /* thread */
    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      min-height: 180px;
    }
    .chat-thread::-webkit-scrollbar { width: 3px; }
    .chat-thread::-webkit-scrollbar-track { background: transparent; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--paper-edge); border-radius: 2px; }

    /* message items — app.js creates article.message.message-user/.message-assistant */
    .message { display: flex; flex-direction: column; gap: 6px; }
    .message h3 {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .message-user p {
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--ink);
      line-height: 1.55;
    }
    .message-assistant p {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: 19px;
      font-variation-settings: "opsz" 24;
      line-height: 1.55;
      color: var(--ink);
    }

    /* empty state */
    .chat-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 0;
      text-align: center;
    }
    .chat-empty-copy { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .chat-empty-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-4);
    }
    .chat-empty h3 {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 400;
      color: var(--ink-2);
      max-width: 34ch;
      line-height: 1.4;
    }
    .chat-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 4px;
    }
    .chat-suggestions button {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid var(--paper-edge);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink-2);
      cursor: pointer;
      transition: background 140ms, border-color 140ms, color 140ms;
    }
    .chat-suggestions button:hover {
      background: var(--paper-2);
      border-color: var(--ink-4);
      color: var(--ink);
    }

    /* composer */
    .chat-composer {
      flex-shrink: 0;
      padding: 16px 0 24px;
      border-top: 1px solid var(--paper-edge);
    }
    .composer-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .composer-prefix {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 18px;
      color: var(--ink-3);
      flex-shrink: 0;
      line-height: 1;
      padding-bottom: 2px;
    }
    .composer-input {
      flex: 1;
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      padding: 8px 0;
      line-height: 1.5;
    }
    .composer-input::placeholder { color: var(--ink-4); }
    .composer-send {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--paper);
      background: var(--ink);
      border: none;
      border-radius: 4px;
      padding: 7px 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 140ms;
    }
    .composer-send:hover { background: var(--ink-2); }
    .composer-send:disabled { opacity: 0.4; cursor: default; }
    .chat-foot-note {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-4);
      letter-spacing: 0.04em;
      margin-top: 8px;
    }

    /* metadata panels */
    .chat-meta {
      flex-shrink: 0;
      padding: 0 0 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .meta-block p {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 8px;
    }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border: 1px solid var(--paper-edge);
      border-radius: 999px;
      color: var(--ink-2);
      background: var(--paper);
      cursor: default;
    }

    /* status */
    .chat-status {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-4);
      min-height: 16px;
      margin: 4px 0;
    }

    @media (max-width: 680px) {
      .topbar { padding: 16px 20px; gap: 1rem; }
      .topbar nav { gap: 16px; }
      .chat-shell { padding: 0 20px; }
      .chat-intro { padding: 24px 0 16px; }
      .chat-intro h1 { font-size: 28px; }
      .message-assistant p { font-size: 17px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="../index.html">Yixin Li</a>
    <nav aria-label="Primary">
      <a href="../index.html">About</a>
      <a href="graph.html">Memory</a>
      <a href="chat.html" class="is-active">Chat</a>
    </nav>
  </header>

  <div class="chat-page">
    <div class="chat-shell">

      <div class="chat-intro">
        <div class="chat-eyebrow">Chat &middot; Ask me anything</div>
        <h1>Talk to me.</h1>
        <p>Ask about school, research, work &mdash; anything. I&rsquo;ll answer from what I remember.</p>
      </div>

      <!-- app.js appends to #chatMessages; empty-state is toggled by inline script below -->
      <div id="chatMessages" class="chat-thread" aria-live="polite" aria-label="Message list">
        <div id="chatEmpty" class="chat-empty">
          <div class="chat-empty-copy">
            <div class="chat-empty-eyebrow">Start anywhere</div>
            <h3>Ask me anything. I&rsquo;ll answer from what I remember.</h3>
            <div class="chat-suggestions" id="chatSuggestions">
              <button type="button">What did you study?</button>
              <button type="button">Tell me about your research.</button>
              <button type="button">What are you working on now?</button>
              <button type="button">Walk me through your engineering work.</button>
            </div>
          </div>
        </div>
      </div>

      <p id="chatStatus" class="chat-status" role="status" aria-live="polite"></p>

      <form id="chatForm" class="chat-composer" novalidate>
        <div class="composer-row">
          <span class="composer-prefix" aria-hidden="true">&rsaquo;</span>
          <input
            id="chatInput"
            name="message"
            class="composer-input"
            type="text"
            placeholder="Ask anything&hellip;"
            autocomplete="off"
            required
          />
          <button id="chatSubmit" class="composer-send" type="submit">Send</button>
        </div>
        <div class="chat-foot-note">enter to send</div>
      </form>

      

    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    (function () {
      const empty = document.getElementById('chatEmpty');
      const msgs  = document.getElementById('chatMessages');
      if (!empty || !msgs) return;

      /* suggestion chips pre-fill the input */
      document.getElementById('chatSuggestions').addEventListener('click', function (e) {
        const btn = e.target.closest('button');
        if (!btn) return;
        const input = document.getElementById('chatInput');
        if (input) {
          input.value = btn.textContent.trim();
          input.focus();
        }
      });

      /* hide empty state as soon as any .message appears */
      new MutationObserver(function () {
        const hasMsg = msgs.querySelector('.message');
        empty.style.display = hasMsg ? 'none' : '';
      }).observe(msgs, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
