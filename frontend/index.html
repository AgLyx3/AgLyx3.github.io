<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yixin Li</title>
  <meta name="description" content="Yixin Li — product builder at the intersection of memory and AI.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Autumn Brush';
      src: url('assets/AutumnBrush.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:       #EFEFEA;
      --paper-2:     #E6E6E0;
      --paper-edge:  #C6C7BE;
      --ink:         #1C1E18;
      --ink-2:       #383B2C;
      --ink-3:       #626558;
      --ink-4:       #969884;
      --forest:      #485A34;
      --forest-hover:#344424;
      --ease-out:    cubic-bezier(0.2, 0.7, 0.2, 1);
      --font-serif:  'Newsreader', Georgia, serif;
      --font-hand:   'Autumn Brush', cursive;
      --font-sans:   'Geist', -apple-system, sans-serif;
      --font-mono:   'Geist Mono', ui-monospace, monospace;
    }

    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Folio header ── */
    .folio {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 36px 40px 0;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .folio .name { color: var(--ink); font-weight: 500; }

    /* ── Column ── */
    .mp-column {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 40px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .mp-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 32px;
      padding: 64px 0 48px;
      min-height: 60vh;
    }

    .mp-line {
      font-family: var(--font-hand);
      font-weight: 400;
      font-size: clamp(26px, 3.4vw, 42px);
      line-height: 1.45;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-wrap: pretty;
    }
    .mp-line em    { font-style: normal; color: var(--ink); }
    .mp-line .accent { color: var(--forest); }

    .mp-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }
    .mp-link {
      font-family: var(--font-hand);
      font-size: clamp(22px, 2.6vw, 32px);
      color: var(--forest);
      text-decoration: underline;
      text-decoration-style: dotted;
      text-decoration-thickness: 1px;
      text-underline-offset: 6px;
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      transition: color 140ms var(--ease-out), gap 140ms var(--ease-out);
    }
    .mp-link:hover { color: var(--forest-hover); gap: 18px; }
    .mp-link .arrow { font-family: var(--font-sans); font-size: 0.7em; }

    /* ── Footer ── */
    .mp-foot {
      border-top: 1px dashed var(--paper-edge);
      padding: 28px 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .mp-foot-art object {
      width: 260px;
      height: 178px;
      display: block;
      pointer-events: none;
    }
    .mp-foot-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      text-transform: uppercase;
    }
    .mp-foot-meta a { color: var(--ink-2); text-decoration: none; }
    .mp-foot-meta a:hover { color: var(--forest); }
    .mp-foot-meta .dot { color: var(--ink-4); }

    /* ── Entry animation ── */
    .folio, .mp-line, .mp-links, .mp-foot {
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.5s var(--ease-out) forwards;
    }
    .folio       { animation-delay: 0ms; }
    .mp-line     { animation-delay: 120ms; }
    .mp-links    { animation-delay: 220ms; }
    .mp-foot     { animation-delay: 300ms; }
    @keyframes rise { to { opacity: 1; transform: none; } }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .folio     { padding: 24px 20px 0; }
      .mp-column { padding: 0 20px; }
      .mp-hero   { padding: 40px 0; gap: 24px; min-height: 55vh; }
      .mp-line   { font-size: 26px; }
      .mp-link   { font-size: 22px; }
      .mp-foot   { padding: 20px 20px 18px; }
      .mp-foot-art object { width: 200px; height: 136px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }
  </style>
</head>
<body>

  <div class="folio">
    <span class="name">Yixin Li</span>
    <span>New York City &middot; 2026</span>
  </div>

  <div class="mp-column">
    <section class="mp-hero">
      <p class="mp-line">
        Hi, I'm Yixin&nbsp;— I build products at the intersection of <em>Human</em> and <span class="accent">AI</span>. Explore my work through the memory graph or just chat.
      </p>

      <nav class="mp-links" aria-label="Primary">
        <a href="graph.html" class="mp-link">
          <span>Memory graph</span>
          <span class="arrow">&rarr;</span>
        </a>
        <a href="chat.html" class="mp-link">
          <span>Chat</span>
          <span class="arrow">&rarr;</span>
        </a>
      </nav>
    </section>
  </div>

  <footer class="mp-foot">
    <div class="mp-foot-art">
      <object type="image/svg+xml" data="assets/spot-desk-laptop.svg" aria-hidden="true"></object>
    </div>
    <div class="mp-foot-meta">
      <span>Yixin Li &middot; 2026</span>
      <span class="dot">&middot;</span>
      <a href="mailto:yixinli.a@gmail.com">Email</a>
      <span class="dot">&middot;</span>
      <a href="https://github.com/AgLyx3" target="_blank" rel="noopener">GitHub</a>
      <span class="dot">&middot;</span>
      <a href="https://linkedin.com/in/yixin-li" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </footer>

</body>
</html>
