<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory · Yixin Li</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,600;1,6..72,400&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .graph-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 2rem 3rem;
    }

    .graph-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      padding: 36px 0 24px;
      flex-wrap: wrap;
    }

    .graph-header-copy {
      max-width: 48rem;
    }

    .graph-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 10px;
    }

    .graph-header-copy h1 {
      font-family: 'Autumn Brush', cursive;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .graph-header-copy p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--ink-3);
    }

    #graphCanvas {
      display: block;
      width: 100%;
      height: 72vh;
      min-height: 520px;
      background: var(--paper);
    }

    /* suppress click outline; keep it for keyboard-only navigation */
    .node:focus { outline: none; }
    .node:focus-visible { outline: 2px solid var(--forest, #485A34); outline-offset: 3px; border-radius: 50%; }
    .node .node-inner {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 220ms var(--ease-out), filter 220ms var(--ease-out);
    }
    .node .node-halo {
      opacity: 0;
      transition: opacity 220ms var(--ease-out), transform 220ms var(--ease-out);
      transform-origin: center;
    }
    .node .node-fill {
      transition: transform 220ms var(--ease-out), opacity 220ms var(--ease-out);
      transform-origin: center;
    }
    .node.is-hovered .node-inner,
    .node:hover .node-inner,
    .node:focus-visible .node-inner {
      transform: scale(1.045);
    }
    .node.is-hovered .node-halo,
    .node:hover .node-halo,
    .node:focus-visible .node-halo {
      opacity: 1;
    }
    .node.is-hovered .node-fill,
    .node:hover .node-fill,
    .node:focus-visible .node-fill {
      opacity: 0.98;
    }

    .graph-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    #graphStatus {
      font-size: 0.8rem;
      color: var(--muted);
    }

    #graphList {
      display: none;
      margin-top: 0.75rem;
    }

    .graph-mobile-section {
      display: grid;
      gap: 0.65rem;
    }

    .graph-mobile-profile {
      display: grid;
      gap: 0.35rem;
      width: 100%;
      border: 1px solid rgba(17, 17, 16, 0.12);
      border-radius: var(--radius);
      background: rgba(17, 17, 16, 0.92);
      color: #fff;
      padding: 1rem 1rem 0.95rem;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .graph-mobile-profile .eyebrow {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.68);
      font-weight: 600;
    }

    .graph-mobile-profile strong {
      font-family: 'Epilogue', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .graph-mobile-profile span:last-child {
      color: rgba(255,255,255,0.74);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .graph-mobile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.3rem;
    }

    .graph-mobile-topic {
      position: relative;
      overflow: hidden;
      border: none;
      border-radius: 16px;
      padding: 0.8rem 0.85rem 0.9rem;
      text-align: left;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: var(--shadow-sm);
      min-height: 92px;
    }

    .graph-mobile-topic::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(42, 122, 82, 0.12) 0%, rgba(42, 122, 82, 0.02) 100%);
      pointer-events: none;
    }

    .graph-mobile-topic-label,
    .graph-mobile-topic-meta {
      position: relative;
      z-index: 1;
    }

    .graph-mobile-topic-label {
      font-family: 'Epilogue', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      display: block;
      line-height: 1.15;
    }

    .graph-mobile-topic-meta {
      display: block;
      margin-top: 0.45rem;
      font-size: 0.76rem;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      #graphList { display: none; }

      #graphCanvas {
        height: 66vh;
        min-height: 380px;
      }

      .graph-wrap { padding: 0 0 1.5rem; }
      .graph-header {
        padding: 24px 1rem 16px;
      }
      /* hide the long description on mobile — keeps canvas tight to the title */
      .graph-header-copy p { display: none; }
      .graph-footer { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">Yixin Li</a>
    <nav class="top-nav" aria-label="Primary">
      <a href="../index.html">About</a>
      <a href="chat.html">Chat</a>
      <a aria-current="page" href="graph.html">Memory</a>
    </nav>
  </header>

  <main class="graph-wrap">
    <section class="graph-header">
      <div class="graph-header-copy">
        <div class="graph-eyebrow">Memory &middot; Topics &amp; experiences</div>
        <h1>Memory Graph</h1>
        <p>Profile memory stays fixed as the durable center. Topic nodes around it reflect the evolving areas of experience that the rest of the portfolio explores.</p>
      </div>
      <button id="graphReload" class="button button-secondary" type="button">Reload Graph</button>
    </section>

    <svg id="graphCanvas" role="img" aria-label="Profile memory centered topic graph"></svg>
    <div class="graph-footer">
      <p id="graphStatus" role="status" aria-live="polite"></p>
    </div>

    <div id="graphList" aria-label="Mobile memory graph"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
  (function () {
    const BASE = (window.APP_CONFIG && window.APP_CONFIG.backendBaseUrl) ||
      localStorage.getItem('backendBaseUrl') || 'http://localhost:8000';

    const svgEl = document.getElementById('graphCanvas');
    const listEl = document.getElementById('graphList');
    const statusEl = document.getElementById('graphStatus');
    const reloadBtn = document.getElementById('graphReload');

    /* VIEW is recalculated on each draw so mobile gets portrait layout */
    function makeView() {
      var mob = window.innerWidth < 720;
      return {
        mobile: mob,
        width:         mob ? 540  : 1120,
        height:        mob ? 680  : 720,
        centerX:       mob ? 270  : 560,
        centerY:       mob ? 310  : 350,
        profileRadius: mob ? 58   : 88,
      };
    }
    var VIEW = makeView();

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function endpoint(path) {
      return BASE.replace(/\/$/, '') + path;
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function normalizeGraphData(raw) {
      return {
        profile_memories: asArray(raw.profile_memories),
        topics: asArray(raw.topics || raw.topic_nodes),
      };
    }

    function getMetric(node) {
      return Number(node.activation != null ? node.activation : 0) || 0;
    }

    function topicRadius(topic, stats) {
      var minR   = VIEW.mobile ? 32 : 48;
      var spread = VIEW.mobile ? 24 : 37;
      if (stats.max === stats.min) return minR + spread * 0.5;
      return minR + ((getMetric(topic) - stats.min) / Math.max(stats.max - stats.min, 0.0001)) * spread;
    }

    function addSvgText(group, label, options) {
      const text = group.append('text')
        .attr('text-anchor', 'middle')
        .attr('font-family', "'Barlow', sans-serif")
        .attr('font-weight', '600')
        .attr('fill', options.fill || 'var(--text)')
        .attr('pointer-events', 'none')
        .attr('x', 0)
        .attr('y', 0);

      const lines = String(label).split('\n');
      lines.forEach(function (line, index) {
        text.append('tspan')
          .attr('x', 0)
          .attr('dy', index === 0 ? (options.firstDy || 0) : (options.lineDy || '1.15em'))
          .attr('font-size', options.fontSize || 12)
          .text(line);
      });
    }

    function wrapLabel(label, radius) {
      var words = label.split(' ');
      var maxChars = Math.max(6, Math.floor(radius / 5.5));
      var lines = [];
      var cur = '';
      words.forEach(function (w) {
        var candidate = cur ? cur + ' ' + w : w;
        if (candidate.length > maxChars && cur) {
          lines.push(cur);
          cur = w;
        } else {
          cur = candidate;
        }
      });
      if (cur) lines.push(cur);
      return lines;
    }

    function drawGraph(data) {
      VIEW = makeView(); /* refresh for current viewport */
      var svg = d3.select(svgEl);
      svg.selectAll('*').remove();
      svg.attr('viewBox', '0 0 ' + VIEW.width + ' ' + VIEW.height)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      /* ── Hue family — cooler, more muted, less amber ── */
      var HUES = {
        forest: { fill: '188,204,168', text: '38,64,24'  },
        sage:   { fill: '198,210,180', text: '68,90,44'  },
        moss:   { fill: '188,198,162', text: '56,78,34'  },
        pine:   { fill: '168,190,172', text: '26,62,44'  },
        olive:  { fill: '210,208,150', text: '80,80,22'  },
        stone:  { fill: '196,196,184', text: '56,58,46'  },
      };
      var HUE_CYCLE = ['sage', 'pine', 'moss', 'olive', 'stone', 'forest'];

      /* ── Defs: gradients + filters ── */
      var defs = svg.append('defs');

      Object.keys(HUES).forEach(function (name) {
        var h = HUES[name];

        /* Bubble fill — visible center, feathers only at very edge */
        var fg = defs.append('radialGradient')
          .attr('id', 'fill-' + name)
          .attr('cx', '50%').attr('cy', '50%').attr('r', '50%');
        [[0, 0.90], [62, 0.85], [82, 0.55], [93, 0.18], [100, 0]].forEach(function (s) {
          fg.append('stop').attr('offset', s[0] + '%')
            .attr('stop-color', 'rgb(' + h.fill + ')').attr('stop-opacity', s[1]);
        });

        /* Anchor fill — same treatment, slightly deeper */
        var ag = defs.append('radialGradient')
          .attr('id', 'fill-anchor-' + name)
          .attr('cx', '50%').attr('cy', '50%').attr('r', '50%');
        [[0, 0.82], [65, 0.76], [84, 0.45], [94, 0.14], [100, 0]].forEach(function (s) {
          ag.append('stop').attr('offset', s[0] + '%')
            .attr('stop-color', 'rgb(' + h.fill + ')').attr('stop-opacity', s[1]);
        });
      });

      /* Drop shadow for floating topic bubbles */
      var ff = defs.append('filter').attr('id', 'shadow-float')
        .attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
      ff.append('feDropShadow')
        .attr('dx', 0).attr('dy', 10).attr('stdDeviation', 12)
        .attr('flood-color', '#1C1E18').attr('flood-opacity', 0.13);

      /* Heavier shadow for the pinned profile/anchor node */
      var af = defs.append('filter').attr('id', 'shadow-anchor')
        .attr('x', '-40%').attr('y', '-40%').attr('width', '180%').attr('height', '180%');
      af.append('feDropShadow')
        .attr('dx', 0).attr('dy', 14).attr('stdDeviation', 16)
        .attr('flood-color', '#1C1E18').attr('flood-opacity', 0.17);

      /* ── Build nodes ── */
      var topicMetrics = data.topics.map(getMetric);
      var stats = {
        min: topicMetrics.length ? Math.min.apply(null, topicMetrics) : 0,
        max: topicMetrics.length ? Math.max.apply(null, topicMetrics) : 0,
      };

      var profileNode = {
        id: '__profile__', label: 'About Me',
        radius: VIEW.profileRadius, isProfile: true, hue: 'forest',
        fx: VIEW.centerX, fy: VIEW.centerY,
        x: VIEW.centerX,  y: VIEW.centerY,
      };

      var topicNodes = data.topics.map(function (t, i) {
        var angle = (Math.PI * 2 * i) / Math.max(data.topics.length, 1);
        var r = topicRadius(t, stats);
        return {
          id: String(t.id), label: t.label || t.id || 'Topic',
          raw: t, radius: r, isProfile: false,
          hue: HUE_CYCLE[i % HUE_CYCLE.length],
          x: VIEW.centerX + Math.cos(angle) * 300,
          y: VIEW.centerY + Math.sin(angle) * 240,
        };
      });

      var nodes = [profileNode].concat(topicNodes);

      /* ── Node groups ── */
      var nodeGroups = svg.selectAll('.node')
        .data(nodes).enter()
        .append('g')
        .attr('class', 'node')
        .attr('tabindex', '0').attr('role', 'link')
        .style('cursor', 'pointer')
        .attr('filter', function (d) {
          return d.isProfile ? 'url(#shadow-anchor)' : 'url(#shadow-float)';
        });

      var nodeInner = nodeGroups.append('g')
        .attr('class', 'node-inner');

      nodeInner.append('circle')
        .attr('class', 'node-halo')
        .attr('r', function (d) { return d.radius + (d.isProfile ? 13 : 10); })
        .attr('fill', function (d) {
          return d.isProfile ? 'rgba(72, 90, 52, 0.14)' : 'rgba(' + HUES[d.hue].fill + ', 0.20)';
        });

      /* Fill circle — visible center with feathered edge */
      nodeInner.append('circle')
        .attr('class', 'node-fill')
        .attr('r', function (d) { return d.radius; })
        .attr('fill', function (d) {
          return 'url(#' + (d.isProfile ? 'fill-anchor-' : 'fill-') + d.hue + ')';
        });

      /* ── Text labels ── */
      nodeGroups.each(function (d) {
        var g = d3.select(this).select('.node-inner');
        var lines = wrapLabel(d.label, d.radius);
        /* Font size proportional to bubble diameter */
        var fsMin = VIEW.mobile ? 10 : 13;
        var fsMax = VIEW.mobile ? 16 : 23;
        var fs = Math.max(fsMin, Math.min(fsMax, fsMin + (d.radius - (VIEW.mobile ? 32 : 45)) * (VIEW.mobile ? 0.3 : 0.25)));
        var lh = fs * 1.1;
        var activation = d.isProfile ? 0 : getMetric(d.raw);
        var hasSubtitle = activation > 0;
        var subFs = Math.max(9, Math.round(fs * 0.58));
        var totalH = lines.length * lh + (hasSubtitle ? subFs * 2.2 : 0);
        var startY = -(totalH / 2) + lh * 0.5;

        var text = g.append('text')
          .attr('text-anchor', 'middle')
          .attr('pointer-events', 'none');

        var textColor = 'rgb(' + HUES[d.hue].text + ')';
        lines.forEach(function (line, i) {
          text.append('tspan')
            .attr('x', 0).attr('y', startY + i * lh)
            .attr('font-family', "'Newsreader', Georgia, serif")
            .attr('font-weight', '600')
            .attr('font-size', fs)
            .attr('letter-spacing', '-0.01em')
            .attr('fill', textColor)
            .text(line);
        });

        if (hasSubtitle) {
          text.append('tspan')
            .attr('x', 0).attr('y', startY + lines.length * lh + subFs * 1.4)
            .attr('font-family', "'Geist Mono', 'Courier New', monospace")
            .attr('font-weight', '500')
            .attr('font-size', subFs)
            .attr('letter-spacing', '0.04em')
            .attr('fill', textColor)
            .text(activation.toFixed(2));
        }
      });

      function setNodeHoverState(group, active) {
        group.classed('is-hovered', !!active);
        if (active) {
          group.raise();
        }
      }

      /* ── Click + keyboard ── */
      nodeGroups.on('click', function (event, d) {
        if (d.isProfile) {
          window.location.href = 'profile.html';
        } else {
          window.location.href = 'topic.html?' + new URLSearchParams({ id: d.id, name: d.label }).toString();
        }
      }).on('mouseenter', function () {
        setNodeHoverState(d3.select(this), true);
      }).on('mouseleave', function () {
        setNodeHoverState(d3.select(this), false);
      }).on('focus', function () {
        setNodeHoverState(d3.select(this), true);
      }).on('blur', function () {
        setNodeHoverState(d3.select(this), false);
      }).on('keydown', function (event, d) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          d3.select(this).dispatch('click');
        }
      });

      /* ── Force simulation ── */
      /* Assign each node a unique phase offset for its personal drift wave */
      nodes.forEach(function (n) {
        n._px = Math.random() * Math.PI * 2;
        n._py = Math.random() * Math.PI * 2;
        n._spd = 0.55 + Math.random() * 0.45;
      });

      var simulation = d3.forceSimulation(nodes)
        .force('collide', d3.forceCollide(function (d) { return d.radius + 8; }).strength(0.9).iterations(4))
        .force('charge', d3.forceManyBody().strength(-40))
        .force('x', d3.forceX(VIEW.centerX).strength(0.025))
        .force('y', d3.forceY(VIEW.centerY).strength(0.025))
        .alphaDecay(0.002)
        .alphaMin(0.0001)
        .alphaTarget(0.06); /* never fully stop — keeps bubbles perpetually drifting */

      var _tick = 0;
      simulation.on('tick', function () {
        _tick++;
        var t = _tick * 0.012;
        nodes.forEach(function (n) {
          if (n.fx != null) return;
          /* Gentle sinusoidal force — each node has its own phase and speed */
          n.vx += Math.sin(t * n._spd + n._px) * 0.22;
          n.vy += Math.cos(t * n._spd * 0.78 + n._py) * 0.18;
          /* Boundary clamping */
          n.x = Math.max(n.radius + 20, Math.min(VIEW.width  - n.radius - 20, n.x));
          n.y = Math.max(n.radius + 20, Math.min(VIEW.height - n.radius - 20, n.y));
        });
        nodeGroups.attr('transform', function (d) { return 'translate(' + d.x + ',' + d.y + ')'; });
      });
    }

    function renderMobile(data) {
      listEl.innerHTML = '';
      const section = document.createElement('div');
      section.className = 'graph-mobile-section';

      const profileButton = document.createElement('button');
      profileButton.type = 'button';
      profileButton.className = 'graph-mobile-profile';
      profileButton.innerHTML = [
        '<span class="eyebrow">Stable core</span>',
        '<strong>About Me</strong>',
        '<span>Durable identity, education, and long-term interests.</span>'
      ].join('');
      profileButton.addEventListener('click', function () {
        window.location.href = 'profile.html';
      });
      section.appendChild(profileButton);

      const topicGrid = document.createElement('div');
      topicGrid.className = 'graph-mobile-grid';
      data.topics.forEach(function (topic) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'graph-mobile-topic';
        button.innerHTML = '<span class="graph-mobile-topic-label">' + topic.label + '</span>' +
          '<span class="graph-mobile-topic-meta">Activation ' + getMetric(topic).toFixed(2) + '</span>';
        button.addEventListener('click', function () {
          const params = new URLSearchParams({ id: topic.id, name: topic.label || topic.id });
          window.location.href = 'topic.html?' + params.toString();
        });
        topicGrid.appendChild(button);
      });
      section.appendChild(topicGrid);

      listEl.appendChild(section);
    }

    async function loadGraph() {
      setStatus('Loading memory graph…');
      try {
        const response = await fetch(endpoint('/graph'));
        if (!response.ok) throw new Error('Status ' + response.status);
        const data = normalizeGraphData(await response.json());
        drawGraph(data);
        renderMobile(data);
        setStatus('Profile and topic memory loaded.');
      } catch (error) {
        setStatus('Could not load graph — ' + error.message);
      }
    }

    reloadBtn.addEventListener('click', loadGraph);
    loadGraph();

    /* Redraw when switching between portrait and landscape */
    var _lastMob = window.innerWidth < 720;
    window.addEventListener('resize', function () {
      var nowMob = window.innerWidth < 720;
      if (nowMob !== _lastMob) { _lastMob = nowMob; loadGraph(); }
    });
  })();
  </script>
</body>
</html>
