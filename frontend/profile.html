<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile · Yixin Li</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .profile-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .profile-header-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .profile-title {
      font-family: 'Epilogue', sans-serif;
      font-weight: 800;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .profile-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.3rem;
      max-width: 48rem;
    }

    .board-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .board-count {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Barlow', sans-serif;
    }

    .mode-toggle {
      display: inline-flex;
      padding: 0.2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      width: fit-content;
      background: rgba(247, 246, 242, 0.9);
      gap: 0.15rem;
    }

    .mode-toggle button {
      border: 0;
      background: transparent;
      color: var(--text-secondary);
      padding: 0.45rem 0.85rem;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 0.84rem;
      cursor: pointer;
    }

    .mode-toggle button[aria-pressed="true"] {
      background: rgba(17, 17, 16, 0.94);
      color: #fff;
    }

    .profile-board {
      columns: 320px;
      column-gap: 1rem;
    }

    .profile-card {
      break-inside: avoid;
      margin-bottom: 1rem;
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .profile-card-header {
      padding: 1rem 1.05rem 0.85rem;
      border-bottom: 1px solid rgba(17, 17, 16, 0.06);
      background: rgba(247, 246, 242, 0.72);
    }

    .profile-card-tag {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Barlow', sans-serif;
    }

    .profile-card-title {
      font-family: 'Epilogue', sans-serif;
      font-size: 1.02rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-top: 0.36rem;
    }

    .profile-card-body {
      padding: 1rem 1.05rem 1.05rem;
    }

    .profile-kv-list {
      display: grid;
      gap: 0.75rem;
    }

    .profile-kv {
      border: 1px solid rgba(17, 17, 16, 0.08);
      border-radius: 16px;
      background: rgba(250, 249, 245, 0.92);
      padding: 0.8rem 0.9rem;
    }

    .profile-kv-key {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .profile-kv-value {
      color: var(--text-secondary);
      font-size: 0.93rem;
      line-height: 1.6;
    }

    .profile-raw {
      border: 1px solid rgba(17, 17, 16, 0.08);
      border-radius: 16px;
      background: rgba(250, 249, 245, 0.92);
      padding: 0.95rem 1rem;
      color: var(--text-secondary);
      line-height: 1.72;
      white-space: pre-wrap;
    }

    #profileStatus {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 1.25rem;
      text-align: center;
      font-family: 'Barlow', sans-serif;
    }

    @media (max-width: 700px) {
      .profile-wrap {
        padding: 0 1rem 3rem;
      }

      .profile-board {
        columns: 1;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">Yixin Li</a>
    <nav class="top-nav" aria-label="Primary">
      <a href="../index.html">About</a>
      <a href="chat.html">Chat</a>
      <a href="graph.html">Memory</a>
    </nav>
  </header>

  <div class="profile-wrap">
    <div class="card profile-header-card">
      <div>
        <h1 class="profile-title">Profile Memory</h1>
        <p class="profile-meta">Stable profile facts derived from conversation context. This layer stays durable while the rest of the graph focuses on evolving topic memory.</p>
      </div>
      <a href="graph.html" class="button button-secondary">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Graph
      </a>
    </div>

    <div class="board-header">
      <div>
        <p class="section-label" style="margin-bottom:0">Profile Records</p>
        <span class="board-count" id="boardCount"></span>
      </div>
      <div class="mode-toggle" aria-label="Profile memory display mode">
        <button id="modeRaw" type="button" aria-pressed="true">Full Context</button>
        <button id="modeStructured" type="button" aria-pressed="false">Structured</button>
      </div>
    </div>

    <div id="profileBoard" class="profile-board" role="list" aria-label="Profile memory records"></div>
    <p id="profileStatus" role="status" aria-live="polite"></p>
  </div>

  <script>
  (function () {
    var BASE = (window.APP_CONFIG && window.APP_CONFIG.backendBaseUrl) ||
      localStorage.getItem('backendBaseUrl') || 'http://localhost:8000';

    var boardEl = document.getElementById('profileBoard');
    var statusEl = document.getElementById('profileStatus');
    var countEl = document.getElementById('boardCount');
    var modeStructuredBtn = document.getElementById('modeStructured');
    var modeRawBtn = document.getElementById('modeRaw');
    var currentMode = 'raw';
    var records = [];

    function setStatus(msg) { if (statusEl) statusEl.textContent = msg || ''; }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function asArr(v) { return Array.isArray(v) ? v : []; }

    function renderBoard() {
      boardEl.innerHTML = '';
      if (countEl) countEl.textContent = records.length + ' item' + (records.length === 1 ? '' : 's');

      if (!records.length) {
        boardEl.innerHTML = '<p class="empty-board">No profile memories returned from backend.</p>';
        return;
      }

      records.forEach(function (record, index) {
        var card = document.createElement('article');
        card.className = 'profile-card';
        card.setAttribute('role', 'listitem');

        var inner =
          '<div class="profile-card-header">' +
            '<div class="profile-card-tag">Profile Memory Row</div>' +
            '<h3 class="profile-card-title">' + escHtml(record.title || ('Profile record ' + (index + 1))) + '</h3>' +
          '</div>' +
          '<div class="profile-card-body">';

        if (currentMode === 'structured') {
          inner += '<div class="profile-kv-list">';
          (record.structured_fields || []).forEach(function (field) {
            inner +=
              '<section class="profile-kv">' +
                '<div class="profile-kv-key">' + escHtml(field.key) + '</div>' +
                '<div class="profile-kv-value">' + escHtml(field.value) + '</div>' +
              '</section>';
          });
          inner += '</div>';
        } else {
          inner += '<div class="profile-raw">' + escHtml(record.raw_context || '') + '</div>';
        }

        inner += '</div>';
        card.innerHTML = inner;
        boardEl.appendChild(card);
      });
    }

    async function loadProfile() {
      setStatus('Loading…');
      try {
        var res = await fetch(BASE.replace(/\/$/, '') + '/graph');
        if (!res.ok) throw new Error('Status ' + res.status);
        var raw = await res.json();
        records = asArr(raw.profile_memories);
        renderBoard();
        setStatus('');
      } catch (err) {
        setStatus('Could not load profile memory — ' + err.message);
      }
    }

    modeRawBtn.addEventListener('click', function () {
      currentMode = 'raw';
      modeRawBtn.setAttribute('aria-pressed', 'true');
      modeStructuredBtn.setAttribute('aria-pressed', 'false');
      renderBoard();
    });

    modeStructuredBtn.addEventListener('click', function () {
      currentMode = 'structured';
      modeRawBtn.setAttribute('aria-pressed', 'false');
      modeStructuredBtn.setAttribute('aria-pressed', 'true');
      renderBoard();
    });

    loadProfile();
  })();
  </script>
</body>
</html>
